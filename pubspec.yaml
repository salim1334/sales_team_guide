name: alarm_sales_guide
description: "A guide for sales persons."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  iconsax: ^0.0.8
  google_fonts: ^8.1.0

  # State Management
  get: ^4.7.3

  # Local Database
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4
  path_provider: ^2.1.5
  path: ^1.9.1

  # Connectivity
  connectivity_plus: ^6.1.4

  # Animations
  lottie: ^3.3.1

  # Splash Screen
  flutter_native_splash: ^2.4.6

  # Clipboard
  clipboard: ^0.1.3
  just_audio: ^0.10.5
  file_picker: ^11.0.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/audio/seed/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/static/Inter_18pt-Regular.ttf
          weight: 400

        - asset: assets/fonts/static/Inter_18pt-Medium.ttf
          weight: 500

        - asset: assets/fonts/static/Inter_18pt-SemiBold.ttf
          weight: 600

        - asset: assets/fonts/static/Inter_18pt-SemiBold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"

flutter_native_splash:
  color: "#041627"
  image: assets/icons/icon.png
  android: true
  ios: true