<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login - Alarm Sales Pro</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#211200",
                        "surface": "#fbf9fa",
                        "on-surface": "#1b1c1d",
                        "secondary-fixed-dim": "#a1d494",
                        "surface-container-low": "#f5f3f4",
                        "surface-container-highest": "#e4e2e3",
                        "inverse-surface": "#303032",
                        "surface-bright": "#fbf9fa",
                        "on-secondary-fixed-variant": "#23501e",
                        "secondary": "#3b6934",
                        "on-tertiary-container": "#a88c69",
                        "tertiary-fixed": "#feddb5",
                        "secondary-fixed": "#bcf0ae",
                        "on-primary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#d2e4fb",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-dim": "#dbd9db",
                        "surface-container-lowest": "#ffffff",
                        "inverse-primary": "#b7c8de",
                        "outline-variant": "#c4c6cd",
                        "on-secondary-fixed": "#002201",
                        "on-secondary-container": "#3f6d38",
                        "secondary-container": "#b9eeab",
                        "primary-container": "#1a2b3c",
                        "on-background": "#1b1c1d",
                        "primary": "#041627",
                        "on-tertiary-fixed": "#281802",
                        "on-primary-fixed": "#0b1d2d",
                        "background": "#fbf9fa",
                        "tertiary-container": "#38260b",
                        "surface-variant": "#e4e2e3",
                        "surface-container": "#efedef",
                        "on-primary-container": "#8192a7",
                        "error": "#ba1a1a",
                        "surface-tint": "#4f6073",
                        "on-surface-variant": "#44474c",
                        "outline": "#74777d",
                        "tertiary-fixed-dim": "#e1c29b",
                        "on-primary-fixed-variant": "#38485a",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#b7c8de",
                        "surface-container-high": "#e9e7e9",
                        "inverse-on-surface": "#f2f0f2",
                        "on-tertiary-fixed-variant": "#584326"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xs": "4px",
                        "md": "16px",
                        "sm": "8px",
                        "2xl": "48px",
                        "base": "4px",
                        "margin-mobile": "16px",
                        "margin-desktop": "32px",
                        "lg": "24px",
                        "xl": "32px",
                        "gutter": "20px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "button": ["Inter"],
                        "body-sm": ["Inter"],

                        "body-lg": ["Inter"],

                        "display-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "button": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "body-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],

                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }]

                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<!-- No Nav Shell because this is a linear/transactional login page -->
<!-- Main Content Canvas -->
<main class="w-full max-w-md mx-auto">
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant shadow-sm overflow-hidden flex flex-col">
<!-- Card Header / Brand -->
<div class="p-lg md:p-xl border-b border-surface-container-highest flex flex-col items-center justify-center text-center">
<div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center mb-md text-on-primary">
<span class="material-symbols-outlined text-[32px]" data-icon="security" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary mb-sm">Alarm Sales Pro</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Administrator Secure Portal</p>
</div>
<!-- Card Body / Form -->
<div class="p-lg md:p-xl flex-grow">
<form class="flex flex-col gap-md">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<div class="relative flex items-center w-full">
<span class="material-symbols-outlined absolute left-3 text-outline" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-3 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow placeholder:text-outline-variant" id="email" placeholder="admin@alarmsalespro.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative flex items-center w-full">
<span class="material-symbols-outlined absolute left-3 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-10 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-sm mt-xs">
<input class="w-4 h-4 rounded-DEFAULT border-outline-variant text-primary focus:ring-primary bg-surface-container-lowest" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer" for="remember">Remember me for 30 days</label>
</div>
<!-- Submit Action -->
<div class="pt-sm">
<button class="w-full bg-primary text-on-primary font-button text-button py-3 px-4 rounded-lg flex items-center justify-center gap-sm hover:bg-on-primary-fixed-variant transition-colors shadow-sm active:scale-[0.98]" type="submit">
<span class="material-symbols-outlined" data-icon="login">login</span>
                            Secure Login
                        </button>
</div>
</form>
</div>
<!-- Card Footer / Secondary Actions -->
<div class="bg-surface-container-low p-md border-t border-surface-container-highest text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Need administrative access? 
                    <a class="font-label-md text-label-md text-secondary hover:underline ml-1" href="#">Create an Admin Account</a>
</p>
</div>
</div>
<!-- Environment Indicator -->
<div class="mt-lg text-center">
<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-surface-container-high border border-outline-variant">
<span class="w-2 h-2 rounded-full bg-secondary"></span>
<span class="font-label-md text-label-md text-on-surface-variant">System Status: Operational</span>
</span>
</div>
</main>
</body></html>
