<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#fbf9fa",
                        "on-background": "#1b1c1d",
                        "primary-container": "#1a2b3c",
                        "on-primary-fixed": "#0b1d2d",
                        "tertiary-fixed-dim": "#e1c29b",
                        "on-primary-fixed-variant": "#38485a",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#b7c8de",
                        "surface-container": "#efedef",
                        "surface-container-high": "#e9e7e9",
                        "on-tertiary-fixed": "#281802",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#1b1c1d",
                        "error-container": "#ffdad6",
                        "surface-dim": "#dbd9db",
                        "on-tertiary-fixed-variant": "#584326",
                        "on-secondary-container": "#3f6d38",
                        "secondary-container": "#b9eeab",
                        "secondary": "#3b6934",
                        "on-secondary-fixed": "#002201",
                        "secondary-fixed-dim": "#a1d494",
                        "primary-fixed": "#d2e4fb",
                        "tertiary-container": "#38260b",
                        "surface-tint": "#4f6073",
                        "on-primary": "#ffffff",
                        "tertiary": "#211200",
                        "primary": "#041627",
                        "surface-bright": "#fbf9fa",
                        "on-surface-variant": "#44474c",
                        "inverse-on-surface": "#f2f0f2",
                        "error": "#ba1a1a",
                        "surface-variant": "#e4e2e3",
                        "surface": "#fbf9fa",
                        "tertiary-fixed": "#feddb5",
                        "surface-container-highest": "#e4e2e3",
                        "inverse-surface": "#303032",
                        "surface-container-low": "#f5f3f4",
                        "outline": "#74777d",
                        "secondary-fixed": "#bcf0ae",
                        "on-secondary": "#ffffff",
                        "on-tertiary-container": "#a88c69",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#b7c8de",
                        "on-secondary-fixed-variant": "#23501e",
                        "on-primary-container": "#8192a7",
                        "outline-variant": "#c4c6cd"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "md": "16px",
                        "xl": "32px",
                        "gutter": "20px",
                        "2xl": "48px",
                        "sm": "8px",
                        "margin-desktop": "32px",
                        "xs": "4px",
                        "lg": "24px",
                        "base": "4px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Inter"],
                        "body-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "button": ["Inter"],
                        "body-md": ["Inter"],
                        "display-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "button": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased">
<!-- TopAppBar -->
<header class="bg-surface text-primary font-headline-sm text-headline-sm w-full sticky top-0 shadow-sm flex items-center justify-between px-margin-mobile md:px-margin-desktop h-16 z-40 border-b border-outline-variant">
<button class="hover:bg-surface-container-high transition-colors active:opacity-70 transition-opacity p-2 -ml-2 rounded-full text-on-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="font-headline-md text-headline-md font-bold text-primary flex-1 text-center">Settings</div>
<button class="hover:bg-surface-container-high transition-colors active:opacity-70 transition-opacity p-2 -mr-2 rounded-full text-on-surface-variant flex items-center justify-center invisible">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-[1440px] mx-auto px-margin-mobile md:px-margin-desktop py-lg lg:py-xl pb-[100px]">
<div class="max-w-2xl mx-auto space-y-lg">
<!-- Appearance Section -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-[0px_1px_3px_rgba(26,43,60,0.05),_0px_4px_6px_rgba(26,43,60,0.03)] overflow-hidden">
<div class="px-md py-md border-b border-surface-variant bg-surface-container-lowest">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Appearance</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Manage how the interface looks.</p>
</div>
<div class="p-md">
<div class="flex items-center justify-between py-sm">
<div class="flex items-center space-x-md">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined" data-icon="palette">palette</span>
</div>
<div>
<h3 class="font-button text-button text-on-surface">Theme</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant">Select Light or Dark mode.</p>
</div>
</div>
<div class="flex bg-surface-container rounded-lg p-xs border border-outline-variant">
<button class="px-md py-sm rounded-md bg-surface-container-lowest text-on-surface shadow-sm font-button text-button flex items-center space-x-xs">
<span class="material-symbols-outlined text-[18px]" data-icon="light_mode">light_mode</span>
<span>Light</span>
</button>
<button class="px-md py-sm rounded-md text-on-surface-variant font-button text-button hover:bg-surface-container-high transition-colors flex items-center space-x-xs">
<span class="material-symbols-outlined text-[18px]" data-icon="dark_mode">dark_mode</span>
<span>Dark</span>
</button>
</div>
</div>
</div>
</section>
<!-- Text Display Section -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-[0px_1px_3px_rgba(26,43,60,0.05),_0px_4px_6px_rgba(26,43,60,0.03)] overflow-hidden">
<div class="px-md py-md border-b border-surface-variant bg-surface-container-lowest">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Text Display</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Adjust typography scale for readability.</p>
</div>
<div class="p-md">
<div class="flex items-center justify-between py-sm">
<div class="flex items-center space-x-md">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined" data-icon="text_fields">text_fields</span>
</div>
<div>
<h3 class="font-button text-button text-on-surface">Font Size</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant">Choose your preferred text size.</p>
</div>
</div>
<div class="flex bg-surface-container rounded-lg p-xs border border-outline-variant">
<button class="px-md py-sm rounded-md text-on-surface-variant font-button text-button hover:bg-surface-container-high transition-colors">
                                Small
                            </button>
<button class="px-md py-sm rounded-md bg-surface-container-lowest text-on-surface shadow-sm font-button text-button">
                                Medium
                            </button>
<button class="px-md py-sm rounded-md text-on-surface-variant font-button text-button hover:bg-surface-container-high transition-colors">
                                Large
                            </button>
</div>
</div>
</div>
</section>
</div>
</main>
<!-- BottomNavBar (Suppressed for Settings page as it's a focus/dead-end relative to global nav) -->
</body></html>
